  <circle cx="96" cy="96" r="14" fill="#fff"/>
  <circle cx="96" cy="96" r="7" fill="#1a237e"/>
  <!-- Arms -->
  <line x1="96" y1="96" x2="52" y2="52" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
  <line x1="96" y1="96" x2="140" y2="52" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
  <line x1="96" y1="96" x2="52" y2="140" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
  <line x1="96" y1="96" x2="140" y2="140" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
  <!-- Motor mounts -->
  <circle cx="52" cy="52" r="6" fill="#fff"/>
  <circle cx="140" cy="52" r="6" fill="#fff"/>
  <circle cx="52" cy="140" r="6" fill="#fff"/>
  <circle cx="140" cy="140" r="6" fill="#fff"/>
  <!-- Propellers -->
  <ellipse cx="52" cy="52" rx="22" ry="6" fill="#fff" opacity="0.5" transform="rotate(-25 52 52)"/>
  <ellipse cx="52" cy="52" rx="22" ry="6" fill="#fff" opacity="0.5" transform="rotate(65 52 52)"/>
  <ellipse cx="140" cy="52" rx="22" ry="6" fill="#fff" opacity="0.5" transform="rotate(25 140 52)"/>
  <ellipse cx="140" cy="52" rx="22" ry="6" fill="#fff" opacity="0.5" transform="rotate(115 140 52)"/>
  <ellipse cx="52" cy="140" rx="22" ry="6" fill="#fff" opacity="0.5" transform="rotate(25 52 140)"/>
  <ellipse cx="52" cy="140" rx="22" ry="6" fill="#fff" opacity="0.5" transform="rotate(115 52 140)"/>
  <ellipse cx="140" cy="140" rx="22" ry="6" fill="#fff" opacity="0.5" transform="rotate(-25 140 140)"/>
  <ellipse cx="140" cy="140" rx="22" ry="6" fill="#fff" opacity="0.5" transform="rotate(65 140 140)"/>
  <!-- Camera -->
  <rect x="89" y="104" width="14" height="8" rx="2" fill="#fff" opacity="0.7"/>
